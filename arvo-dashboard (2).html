<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARVO — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#1d7d7d;--blue-dark:#155a5a;--blue-mid:#1e6868;--blue-card:#1a5f5f;--blue-deep:#114848;
  --peach:#f5b896;--peach-drk:#e89872;--peach-lt:rgba(245,184,150,0.15);
  --cream:#fdf6ef;--sub:rgba(245,184,150,0.55);--border:rgba(245,184,150,0.16);--border-hi:rgba(245,184,150,0.45);
  --green:#6ddba0;--green-bg:rgba(109,219,160,0.12);
  --amber:#f5c842;--amber-bg:rgba(245,200,66,0.12);
  --red:#f57c6d;--red-bg:rgba(245,124,109,0.12);
}
html{scroll-behavior:smooth;}
body{font-family:'Nunito Sans',sans-serif;background:var(--blue);color:var(--peach);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* LOGIN */
#login-view{display:flex;flex-direction:column;min-height:100vh;}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px;}
.login-card{background:var(--blue-mid);border:1px solid var(--border);border-radius:16px;padding:52px 48px;width:100%;max-width:400px;text-align:center;}
.login-logo{font-size:40px;font-weight:800;letter-spacing:0.18em;color:var(--peach);text-transform:uppercase;margin-bottom:4px;}
.login-tag{font-size:11px;color:var(--sub);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:44px;}
.login-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:8px;}
.login-fields input{width:100%;background:var(--blue-dark);border:1px solid var(--border);border-radius:8px;padding:14px 18px;font-family:'Nunito Sans',sans-serif;font-size:15px;color:var(--peach);outline:none;transition:border-color 0.2s;}
.login-fields input:focus{border-color:var(--border-hi);}
.login-fields input::placeholder{color:var(--sub);}
.login-err{font-size:12px;color:var(--red);margin:10px 0 14px;display:none;}
.login-btn{width:100%;background:var(--peach);color:var(--blue);border:none;border-radius:8px;padding:14px;font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:6px;}
.login-btn:hover{background:var(--peach-drk);}

/* NAV */
.nav{background:var(--cream);padding:0 48px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:1px solid #e4d8ca;}
.nav-logo{font-size:17px;font-weight:800;letter-spacing:0.22em;color:var(--blue);text-transform:uppercase;}
.nav-logo em{font-style:normal;font-weight:400;font-size:11px;color:#aaa;margin-left:8px;letter-spacing:0.14em;text-transform:lowercase;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-date{font-size:11px;color:#aaa;letter-spacing:0.06em;}
.nav-out{background:none;border:1.5px solid #c8bdb0;border-radius:4px;padding:7px 16px;font-family:'Nunito Sans',sans-serif;font-size:11px;font-weight:600;color:#888;cursor:pointer;transition:all 0.2s;letter-spacing:0.08em;}
.nav-out:hover{border-color:var(--blue);color:var(--blue);}
.nav-refresh{background:var(--blue);border:none;border-radius:4px;padding:7px 16px;font-family:'Nunito Sans',sans-serif;font-size:11px;font-weight:600;color:var(--cream);cursor:pointer;transition:all 0.2s;letter-spacing:0.08em;}
.nav-refresh:hover{background:var(--blue-dark);}

/* TABS */
.tabs{background:var(--blue-dark);border-bottom:1px solid var(--border);padding:0 48px;display:flex;}
.tab{padding:15px 0;margin-right:40px;border:none;background:none;font-family:'Nunito Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;margin-bottom:-1px;}
.tab.active{color:var(--peach);border-bottom-color:var(--peach);}
.tab-count{background:var(--peach-lt);color:var(--peach);border-radius:10px;padding:1px 8px;font-size:10px;margin-left:6px;font-weight:700;}

/* DASH */
#dash-view{display:none;flex-direction:column;min-height:100vh;}
.dash-body{padding:40px 48px 80px;}

/* LOADING */
.loading-state{padding:80px 24px;text-align:center;color:var(--sub);font-size:14px;font-style:italic;}
.loading-spinner{display:inline-block;width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--peach);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
.stat{background:var(--blue-mid);border:1px solid var(--border);border-radius:12px;padding:24px 22px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--peach);opacity:0.3;}
.stat.highlight::before{opacity:1;}
.stat-num{font-size:42px;font-weight:800;color:var(--peach);line-height:1;margin-bottom:5px;letter-spacing:-0.02em;}
.stat-label{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--sub);}

/* INSIGHT BANNER */
.insight-banner{background:var(--blue-deep);border:1px solid var(--border-hi);border-radius:10px;padding:18px 22px;margin-bottom:32px;display:flex;gap:14px;align-items:flex-start;}
.ib-icon{font-size:20px;flex-shrink:0;}
.ib-text{font-size:13px;color:var(--sub);line-height:1.6;}
.ib-text strong{color:var(--peach);font-weight:700;}

/* SEC */
.sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--sub);}
.sec-action{font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;background:none;border:1px solid var(--border);border-radius:4px;padding:5px 12px;font-family:'Nunito Sans',sans-serif;transition:all 0.15s;letter-spacing:0.06em;}
.sec-action:hover{border-color:var(--peach);color:var(--peach);}

/* CANDIDATE CARDS */
.candidates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:40px;}
.cand-card{background:var(--blue-mid);border:1px solid var(--border);border-radius:12px;padding:22px 24px;cursor:pointer;transition:all 0.2s;position:relative;}
.cand-card:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.2);}
.cand-card.top-pick{border-color:var(--green);}
.cand-card.top-pick::after{content:'⭐ Top Pick';position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;letter-spacing:0.1em;background:var(--green-bg);color:var(--green);padding:3px 9px;border-radius:10px;}
.cc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.cc-name{font-size:18px;font-weight:800;color:var(--peach);line-height:1.1;}
.cc-role{font-size:12px;color:var(--sub);margin-top:3px;font-style:italic;}
.score-ring{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;border:2.5px solid;flex-shrink:0;}
.score-high{border-color:var(--green);color:var(--green);background:var(--green-bg);}
.score-mid{border-color:var(--amber);color:var(--amber);background:var(--amber-bg);}
.score-low{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.score-label{font-size:9px;color:var(--sub);text-align:center;margin-top:3px;letter-spacing:0.06em;text-transform:uppercase;}
.cc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.tag{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-amber{background:var(--amber-bg);color:var(--amber);}
.tag-red{background:var(--red-bg);color:var(--red);}
.tag-blue{background:rgba(245,184,150,0.1);color:var(--peach);}
.cc-insight{font-size:12px;color:var(--sub);line-height:1.55;border-top:1px solid var(--border);padding-top:12px;font-style:italic;}
.cc-insight strong{color:var(--peach);font-style:normal;font-weight:600;}
.cc-meta{display:flex;gap:16px;margin-top:12px;}
.cc-meta-item{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;}
.cc-meta-item strong{color:var(--peach);font-weight:600;}

/* BREAKDOWN */
.breakdown-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:40px;}
.breakdown-card{background:var(--blue-mid);border:1px solid var(--border);border-radius:12px;padding:24px;}
.bc-title{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--sub);margin-bottom:20px;}
.bar-item{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.bar-item:last-child{margin-bottom:0;}
.bar-label{font-size:12px;color:var(--peach);min-width:150px;font-weight:400;flex-shrink:0;}
.bar-track{flex:1;height:6px;background:rgba(245,184,150,0.1);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;background:var(--peach);transition:width 1s ease;}
.bar-count{font-size:11px;color:var(--sub);min-width:24px;text-align:right;font-weight:600;}

/* TABLE */
.table-wrap{background:var(--blue-mid);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:40px;}
.t-head{display:grid;padding:12px 22px;background:rgba(0,0,0,0.2);font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--sub);gap:14px;border-bottom:1px solid var(--border);}
.t-row{display:grid;padding:16px 22px;gap:14px;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;font-size:13px;}
.t-row:last-child{border-bottom:none;}
.t-row:hover{background:rgba(0,0,0,0.1);}
.cand-table-cols{grid-template-columns:1.8fr 1.5fr 1fr 1fr 1fr 60px 70px;}
.client-table-cols{grid-template-columns:1.8fr 1.5fr 0.8fr 1fr 1.2fr 70px;}
.r-name{font-weight:700;color:var(--peach);}
.r-muted{color:var(--sub);font-size:12px;}

/* CLIENT CARDS */
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:40px;}
.client-card{background:var(--blue-mid);border:1px solid var(--border);border-radius:12px;padding:22px 24px;cursor:pointer;transition:all 0.2s;position:relative;}
.client-card:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.2);}
.client-card.urgent{border-color:var(--red);}
.client-card.urgent::after{content:'🔥 Urgent';position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;background:var(--red-bg);color:var(--red);padding:3px 9px;border-radius:10px;}
.cl-name{font-size:17px;font-weight:800;color:var(--peach);}
.cl-role{font-size:12px;color:var(--sub);font-style:italic;margin-top:3px;margin-bottom:14px;}
.cl-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.cl-insight{font-size:12px;color:var(--sub);line-height:1.55;border-top:1px solid var(--border);padding-top:12px;}
.cl-insight strong{color:var(--peach);font-weight:600;font-style:normal;}

/* ARVO+ */
.signal-board{background:var(--blue-deep);border:1px solid var(--border-hi);border-radius:12px;padding:28px;margin-bottom:40px;}
.signal-board-title{font-size:13px;font-weight:700;color:var(--peach);margin-bottom:4px;}
.signal-board-sub{font-size:12px;color:var(--sub);margin-bottom:24px;font-style:italic;}
.signals-list{display:flex;flex-direction:column;gap:12px;}
.signal-item{background:var(--blue-mid);border:1px solid var(--border);border-radius:8px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px;}
.signal-icon{font-size:18px;flex-shrink:0;}
.signal-company{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--sub);margin-bottom:5px;}
.signal-text{font-size:13px;color:var(--peach);line-height:1.55;}

/* DRAWER */
.overlay{display:none;position:fixed;inset:0;background:rgba(10,40,40,0.7);z-index:300;justify-content:flex-end;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.drawer{background:var(--blue-dark);border-left:1px solid var(--border);width:100%;max-width:560px;height:100vh;overflow-y:auto;padding:48px 44px;position:relative;animation:slideIn 0.28s cubic-bezier(.4,0,.2,1);}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.drawer-close{position:absolute;top:20px;right:20px;background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--sub);font-family:'Nunito Sans',sans-serif;transition:all 0.15s;}
.drawer-close:hover{border-color:var(--peach);color:var(--peach);}
.d-type{font-size:10px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--sub);margin-bottom:6px;}
.d-name{font-size:32px;font-weight:800;color:var(--peach);line-height:1;margin-bottom:4px;}
.d-sub{font-size:13px;color:var(--sub);font-style:italic;margin-bottom:6px;}
.d-date{font-size:11px;color:var(--sub);margin-bottom:20px;}
.d-score-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px 18px;background:var(--blue-mid);border-radius:10px;border:1px solid var(--border);}
.d-score-label strong{color:var(--peach);font-size:18px;font-weight:800;display:block;margin-bottom:2px;}
.d-score-label{font-size:11px;color:var(--sub);}
.d-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.drawer-rule{height:1px;background:var(--border);margin-bottom:24px;}
.qa-list{display:flex;flex-direction:column;gap:24px;}
.qa-section-head{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--peach);padding:8px 0;border-bottom:1px solid var(--border);margin-top:8px;}
.qa-q{font-size:10px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--sub);margin-bottom:6px;}
.qa-a{font-size:14px;color:var(--peach);line-height:1.65;font-weight:400;}
.empty-state{padding:72px 24px;text-align:center;color:var(--sub);font-size:14px;font-weight:300;font-style:italic;line-height:1.7;}

@media(max-width:1000px){.stats-row{grid-template-columns:1fr 1fr;}.breakdown-row{grid-template-columns:1fr;}}
@media(max-width:680px){.nav,.tabs,.dash-body{padding-left:20px;padding-right:20px;}.drawer{max-width:100%;padding:32px 20px;}}
</style>
</head>
<body>

<div id="login-view">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">ARVO</div>
      <div class="login-tag">Team Dashboard</div>
      <div class="login-fields">
        <input type="text" id="lu" placeholder="Username"/>
        <input type="password" id="lp" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="login-err" id="lerr">Incorrect credentials.</div>
      <button class="login-btn" onclick="login()">Enter Dashboard</button>
    </div>
  </div>
</div>

<div id="dash-view">
  <nav class="nav">
    <div class="nav-logo">ARVO <em>dashboard</em></div>
    <div class="nav-right">
      <span class="nav-date" id="dash-date"></span>
      <button class="nav-refresh" onclick="refreshData()">↻ Refresh</button>
      <button class="nav-out" onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('candidates',this)">Candidates <span class="tab-count" id="tc-c">0</span></button>
    <button class="tab" onclick="switchTab('clients',this)">Clients <span class="tab-count" id="tc-cl">0</span></button>
    <button class="tab" onclick="switchTab('arvoplus',this)">ARVO+ Signals <span class="tab-count" id="tc-ap">0</span></button>
  </div>
  <div class="dash-body">
    <div id="tab-candidates"></div>
    <div id="tab-clients" style="display:none;"></div>
    <div id="tab-arvoplus" style="display:none;"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="drawer">
    <button class="drawer-close" onclick="closeDrawer()">Close ✕</button>
    <div class="d-type" id="d-type"></div>
    <div class="d-name" id="d-name"></div>
    <div class="d-sub" id="d-sub"></div>
    <div class="d-date" id="d-date"></div>
    <div class="d-score-row" id="d-score-row" style="display:none;">
      <div class="score-ring" id="d-score-ring"></div>
      <div>
        <div class="d-score-label"><strong id="d-score-val">—</strong>Alignment Score</div>
        <div id="d-score-why" style="font-size:11px;color:var(--sub);margin-top:2px;max-width:340px;line-height:1.45;"></div>
      </div>
    </div>
    <div class="d-tags" id="d-tags"></div>
    <div class="drawer-rule"></div>
    <div class="qa-list" id="d-qa"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://yjvyakalhoswnrioeppd.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlqdnlha2FsaG9zd25yaW9lcHBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDI5NTcsImV4cCI6MjA4ODMxODk1N30.etXqE0gEDsApXHRvZ_5mgIMei7t0AVv4aJZyV_eSMzE';
const CREDS={user:'arvo',pass:'arvo2024'};

let db={candidates:[],clients:[]};
let currentTab='candidates';

// ── SUPABASE ─────────────────────────────────
async function fetchFromSupabase(table){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}?order=created_at.desc`,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'}
  });
  if(!res.ok)throw new Error(`Fetch error: ${res.status}`);
  return res.json();
}

async function loadData(){
  const [cands,clients]=await Promise.all([fetchFromSupabase('candidates'),fetchFromSupabase('clients')]);
  db.candidates=cands.map(r=>({id:r.id,ts:r.created_at,role:r.role||'',company:r.company||'',a:r.answers||{}}));
  db.clients=clients.map(r=>({id:r.id,ts:r.created_at,a:r.answers||{}}));
}

// ── AUTH ─────────────────────────────────────
async function login(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const err=document.getElementById('lerr');
  if(u!==CREDS.user||p!==CREDS.pass){err.style.display='block';return;}
  err.style.display='none';
  document.getElementById('login-view').style.display='none';
  document.getElementById('dash-view').style.display='flex';
  document.getElementById('dash-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('tab-candidates').innerHTML=loadingHtml();
  await refreshData();
}

function logout(){
  document.getElementById('dash-view').style.display='none';
  document.getElementById('login-view').style.display='flex';
  document.getElementById('lu').value='';
  document.getElementById('lp').value='';
}

async function refreshData(){
  try{
    await loadData();
    document.getElementById('tc-c').textContent=db.candidates.length;
    document.getElementById('tc-cl').textContent=db.clients.length;
    document.getElementById('tc-ap').textContent=db.clients.filter(c=>c.a.wish_existed||c.a.biggest_headache).length;
    if(currentTab==='candidates')renderCandidates();
    else if(currentTab==='clients')renderClients();
    else renderArvoPlus();
  }catch(e){
    console.error(e);
    document.getElementById('tab-'+currentTab).innerHTML=`<div class="empty-state">⚠️ Could not load data from database.<br>Check your connection and try refreshing.</div>`;
  }
}

function loadingHtml(){
  return`<div class="loading-state"><div class="loading-spinner"></div><br>Loading from database...</div>`;
}

// ── TABS ─────────────────────────────────────
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['tab-candidates','tab-clients','tab-arvoplus'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(`tab-${tab}`).style.display='block';
  if(tab==='candidates')renderCandidates();
  else if(tab==='clients')renderClients();
  else renderArvoPlus();
}

// ── SCORING ───────────────────────────────────
function scoreCandidate(c){
  let score=0,reasons=[],flags=[];
  const a=c.a;
  if((a.readiness||'').includes('Actively')){score+=30;reasons.push('actively looking');}
  else if((a.readiness||'').includes('Open')){score+=20;reasons.push('open to move');}
  else if((a.readiness||'').includes('Exploring')){score+=10;}
  else{score+=5;flags.push('not actively looking');}
  if((a.decision_style||'').includes('move anyway')){score+=20;reasons.push('high autonomy');}
  else if((a.decision_style||'').includes('gather')){score+=15;}
  else if((a.decision_style||'').includes('flag')){score+=8;flags.push('may need direction');}
  else{score+=5;flags.push('prefers certainty');}
  if((a.feedback_style||'').includes('actively seek')){score+=15;reasons.push('feedback-oriented');}
  else if((a.feedback_style||'').includes('okay')){score+=12;}
  else if((a.feedback_style||'').includes('building')){score+=7;}
  else{score+=5;}
  if((a.env_experience||'').length>80){score+=20;reasons.push('strong env experience');}
  else if((a.env_experience||'').length>30){score+=12;}
  else if(a.env_experience){score+=6;}
  if((a.nonneg_proof||'').length>80){score+=15;reasons.push('proven non-negotiable');}
  else if((a.nonneg_proof||'').length>30){score+=8;}
  return{score:Math.min(Math.round(score/100*100),99),reasons,flags};
}

function scoreClass(s){return s>=72?'score-high':s>=48?'score-mid':'score-low';}
function readinessTag(r){
  if(!r)return{text:'Unknown',cls:'tag-blue'};
  if(r.includes('Actively'))return{text:'Active',cls:'tag-green'};
  if(r.includes('Open'))return{text:'Open',cls:'tag-amber'};
  if(r.includes('Exploring'))return{text:'Exploring',cls:'tag-blue'};
  return{text:'Passive',cls:'tag-red'};
}

// ── BARS ──────────────────────────────────────
function renderBars(elId,data,extractor){
  const counts={};
  data.forEach(d=>{const k=extractor(d);if(k&&k!=='Not answered'&&k!=='Unknown')counts[k]=(counts[k]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max=sorted[0]?.[1]||1;
  const el=document.getElementById(elId);
  if(!el)return;
  if(!sorted.length){el.innerHTML=`<div style="font-size:13px;color:var(--sub);font-style:italic;padding:8px 0;">No data yet.</div>`;return;}
  el.innerHTML=sorted.map(([label,count])=>`
    <div class="bar-item">
      <div class="bar-label">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>`).join('');
}

  const headers=['Date','Score (candidates)',...keys];
  const rows=data.map(d=>{
    const score=type==='candidates'?scoreCandidate(d).score:'';
    return[new Date(d.ts).toLocaleDateString('en-GB'),score,...keys.map(k=>`"${(d.a[k]||'').toString().replace(/"/g,'""')}"`)]
  });
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`arvo-${type}-${Date.now()}.csv`;a.click();
}
</script>
</body>
</html>
